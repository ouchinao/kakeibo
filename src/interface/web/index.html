<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kakeibo Engine</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E" />
    <style>
      :root {
        --bg: #0f1216;
        --panel: #181d24;
        --panel-2: #20262f;
        --text: #e8edf2;
        --muted: #94a3b8;
        --accent: #4ade80;
        --warn: #f87171;
        --line: #2b323c;
        --radius: 14px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      header {
        padding: 24px 20px 8px;
        max-width: 980px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      h1 { margin: 0; font-size: 1.6rem; }
      h1 small { color: var(--muted); font-weight: 400; font-size: 0.95rem; }
      main { max-width: 980px; margin: 0 auto; padding: 12px 20px 64px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
      .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px;
      }
      .card h2 { margin: 0 0 12px; font-size: 1.05rem; }
      .stat { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
      .stat .label { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em; }
      .stat .value { font-size: 1.5rem; font-weight: 600; margin-top: 4px; }
      .value.good { color: var(--accent); }
      .value.bad { color: var(--warn); }
      label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; }
      input, select, textarea, button {
        font: inherit;
        color: var(--text);
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 11px;
      }
      input, select, textarea { width: 100%; }
      .field { flex: 1 1 130px; }
      button {
        cursor: pointer;
        background: var(--accent);
        color: #06210f;
        font-weight: 600;
        border: none;
      }
      button.ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); font-weight: 500; }
      button.danger { background: transparent; color: var(--warn); border: 1px solid var(--line); padding: 4px 9px; }
      .lang-select { width: auto; padding: 6px 10px; }
      section { margin-top: 22px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line); font-size: 0.92rem; }
      th { color: var(--muted); font-weight: 500; }
      .tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line); }
      .bar { height: 8px; background: var(--panel-2); border-radius: 999px; overflow: hidden; margin-top: 6px; }
      .bar > span { display: block; height: 100%; background: var(--accent); }
      .bar.over > span { background: var(--warn); }
      .cat-row { padding: 12px 0; border-bottom: 1px solid var(--line); }
      .cat-row:last-child { border-bottom: none; }
      .cat-head { display: flex; justify-content: space-between; font-size: 0.92rem; }
      .muted { color: var(--muted); }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      .toast {
        position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
        background: var(--panel-2); border: 1px solid var(--line); padding: 10px 16px;
        border-radius: 10px; opacity: 0; transition: opacity 0.2s; pointer-events: none;
      }
      .toast.show { opacity: 1; }
      .toast.error { border-color: var(--warn); color: var(--warn); }
    </style>
  </head>
  <body>
    <header>
      <h1>💰 Kakeibo Engine <small data-i18n="app.subtitle">— mindful monthly budgeting</small></h1>
      <div class="field" style="flex: 0 0 auto">
        <label for="lang" data-i18n="label.language">Language</label>
        <select id="lang" class="lang-select">
          <option value="en">English</option>
          <option value="ja">日本語</option>
        </select>
      </div>
    </header>
    <main>
      <div class="row" style="margin-bottom: 8px">
        <div class="field" style="max-width: 200px">
          <label for="month" data-i18n="label.month">Month</label>
          <input type="month" id="month" />
        </div>
        <div class="field" style="max-width: 160px">
          <label for="currency" data-i18n="label.currency">Currency</label>
          <select id="currency"></select>
        </div>
      </div>

      <section class="grid" id="stats"></section>

      <section class="card">
        <h2 data-i18n="heading.categorySpending">Spending by category</h2>
        <div id="categories"><p class="muted">…</p></div>
      </section>

      <section class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap">
          <h2 style="margin: 0" data-i18n="heading.trend">Trend</h2>
          <div class="field" style="max-width: 150px; flex: 0 0 auto">
            <select id="trend-range" data-i18n-aria-label="label.trendRange" aria-label="Trend range">
              <option value="3" data-i18n="trend.range3">Last 3 months</option>
              <option value="6" selected data-i18n="trend.range6">Last 6 months</option>
              <option value="12" data-i18n="trend.range12">Last 12 months</option>
            </select>
          </div>
        </div>
        <div id="trend" style="margin-top: 12px"><p class="muted">…</p></div>
        <div style="display: flex; gap: 16px; margin-top: 10px; font-size: 0.82rem" class="muted">
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:2px"></span> <span data-i18n="type.income">Income</span></span>
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--warn);border-radius:2px"></span> <span data-i18n="type.expense">Expense</span></span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#60a5fa;border-radius:2px"></span> <span data-i18n="trend.savings">Savings</span></span>
        </div>
      </section>

      <section class="grid" style="grid-template-columns: 1fr 1fr">
        <div class="card">
          <h2 data-i18n="heading.forecast">Forecast</h2>
          <div id="forecast"><p class="muted">…</p></div>
        </div>

        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap">
            <h2 style="margin: 0" data-i18n="heading.recurring">Recurring expenses</h2>
            <button type="button" id="post-recurring-btn" class="ghost" data-i18n="button.postToMonth">Post to this month</button>
          </div>
          <form id="recurring-form" style="margin-top: 12px">
            <div class="row">
              <div class="field" style="flex: 1 1 100%"><label for="rec-name" data-i18n="label.recurringName">Name</label><input id="rec-name" data-i18n-placeholder="placeholder.recurringName" placeholder="Rent, Netflix…" required /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field"><label for="rec-amount" data-i18n="label.amount">Amount</label><input id="rec-amount" class="amount-input" type="number" step="0.01" min="0" required /></div>
              <div class="field"><label for="rec-day" data-i18n="label.day">Day</label><input id="rec-day" type="number" min="1" max="28" value="1" required /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field"><label for="rec-category" data-i18n="label.category">Category</label>
                <select id="rec-category">
                  <option value="NEEDS" data-i18n="category.NEEDS">Needs</option>
                  <option value="WANTS" data-i18n="category.WANTS">Wants</option>
                  <option value="CULTURE" data-i18n="category.CULTURE">Culture</option>
                  <option value="UNEXPECTED" data-i18n="category.UNEXPECTED">Unexpected</option>
                </select>
              </div>
              <div class="field" style="display: flex; align-items: flex-end"><button type="submit" style="width:100%" data-i18n="button.addRecurring">Add recurring</button></div>
            </div>
          </form>
          <div id="recurring-list" style="margin-top: 12px"></div>
        </div>
      </section>

      <section class="grid" style="grid-template-columns: 1fr 1fr">
        <div class="card">
          <h2 data-i18n="heading.addTransaction">Add transaction</h2>
          <form id="tx-form">
            <div class="row">
              <div class="field"><label for="tx-type" data-i18n="label.type">Type</label>
                <select name="type" id="tx-type">
                  <option value="EXPENSE" data-i18n="type.expense">Expense</option>
                  <option value="INCOME" data-i18n="type.income">Income</option>
                </select>
              </div>
              <div class="field"><label for="tx-amount" data-i18n="label.amount">Amount</label><input name="amount" id="tx-amount" class="amount-input" type="number" step="0.01" min="0" required /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field" id="tx-category-field"><label for="tx-category" data-i18n="label.category">Category</label>
                <select name="category" id="tx-category">
                  <option value="NEEDS" data-i18n="category.NEEDS">Needs</option>
                  <option value="WANTS" data-i18n="category.WANTS">Wants</option>
                  <option value="CULTURE" data-i18n="category.CULTURE">Culture</option>
                  <option value="UNEXPECTED" data-i18n="category.UNEXPECTED">Unexpected</option>
                </select>
              </div>
              <div class="field"><label for="tx-note" data-i18n="label.note">Note</label><input name="note" id="tx-note" data-i18n-placeholder="placeholder.note" placeholder="optional" /></div>
            </div>
            <div style="margin-top: 12px"><button type="submit" data-i18n="button.add">Add</button></div>
          </form>
        </div>

        <div class="card">
          <h2 data-i18n="heading.monthlyPlan">Monthly plan</h2>
          <form id="plan-form">
            <div class="row">
              <div class="field"><label for="plan-income" data-i18n="label.plannedIncome">Planned income</label><input id="plan-income" class="amount-input" type="number" step="0.01" min="0" required /></div>
              <div class="field"><label for="plan-savings" data-i18n="label.savingsGoal">Savings goal</label><input id="plan-savings" class="amount-input" type="number" step="0.01" min="0" required /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field"><label for="plan-NEEDS" data-i18n="label.needsBudget">Needs budget</label><input id="plan-NEEDS" class="amount-input" type="number" step="0.01" min="0" /></div>
              <div class="field"><label for="plan-WANTS" data-i18n="label.wantsBudget">Wants budget</label><input id="plan-WANTS" class="amount-input" type="number" step="0.01" min="0" /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field"><label for="plan-CULTURE" data-i18n="label.cultureBudget">Culture budget</label><input id="plan-CULTURE" class="amount-input" type="number" step="0.01" min="0" /></div>
              <div class="field"><label for="plan-UNEXPECTED" data-i18n="label.unexpectedBudget">Unexpected budget</label><input id="plan-UNEXPECTED" class="amount-input" type="number" step="0.01" min="0" /></div>
            </div>
            <div style="margin-top: 12px"><button type="submit" class="ghost" data-i18n="button.savePlan">Save plan</button></div>
          </form>
        </div>
      </section>

      <section class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap">
          <h2 style="margin: 0" data-i18n="heading.transactions">Transactions</h2>
          <div style="display: flex; gap: 8px">
            <button type="button" id="export-btn" class="ghost"><span aria-hidden="true">⬇ </span><span data-i18n="button.exportCsv">Export CSV</span></button>
            <button type="button" id="import-btn" class="ghost"><span aria-hidden="true">⬆ </span><span data-i18n="button.importCsv">Import CSV</span></button>
            <input type="file" id="import-input" accept=".csv,text/csv" data-i18n-aria-label="button.importCsv" aria-label="Import CSV" hidden />
          </div>
        </div>
        <table style="margin-top: 12px">
          <thead><tr>
            <th data-i18n="table.date">Date</th>
            <th data-i18n="table.type">Type</th>
            <th data-i18n="table.category">Category</th>
            <th data-i18n="table.note">Note</th>
            <th style="text-align:right" data-i18n="table.amount">Amount</th>
            <th><span class="sr-only" data-i18n="table.actions">Actions</span></th>
          </tr></thead>
          <tbody id="tx-list"><tr><td colspan="6" class="muted">…</td></tr></tbody>
        </table>
      </section>

      <section class="card">
        <h2 data-i18n="heading.reflection">Month-end reflection</h2>
        <form id="reflection-form" class="grid" style="grid-template-columns: 1fr 1fr"></form>
        <div style="margin-top: 12px"><button type="submit" form="reflection-form" class="ghost" data-i18n="button.saveReflection">Save reflection</button></div>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
