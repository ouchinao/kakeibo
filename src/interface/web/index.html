<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kakeibo Engine</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E" />
    <style>
      :root {
        --bg: #0f1216;
        --panel: #181d24;
        --panel-2: #20262f;
        --text: #e8edf2;
        --muted: #94a3b8;
        --accent: #4ade80;
        --warn: #f87171;
        --line: #2b323c;
        --radius: 14px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      header {
        padding: 24px 20px 8px;
        max-width: 980px;
        margin: 0 auto;
      }
      h1 { margin: 0; font-size: 1.6rem; }
      h1 small { color: var(--muted); font-weight: 400; font-size: 0.95rem; }
      main { max-width: 980px; margin: 0 auto; padding: 12px 20px 64px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
      .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px;
      }
      .card h2 { margin: 0 0 12px; font-size: 1.05rem; }
      .stat { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
      .stat .label { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em; }
      .stat .value { font-size: 1.5rem; font-weight: 600; margin-top: 4px; }
      .value.good { color: var(--accent); }
      .value.bad { color: var(--warn); }
      label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; }
      input, select, textarea, button {
        font: inherit;
        color: var(--text);
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 11px;
      }
      input, select, textarea { width: 100%; }
      .field { flex: 1 1 130px; }
      button {
        cursor: pointer;
        background: var(--accent);
        color: #06210f;
        font-weight: 600;
        border: none;
      }
      button.ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); font-weight: 500; }
      button.danger { background: transparent; color: var(--warn); border: 1px solid var(--line); padding: 4px 9px; }
      section { margin-top: 22px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line); font-size: 0.92rem; }
      th { color: var(--muted); font-weight: 500; }
      .tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line); }
      .bar { height: 8px; background: var(--panel-2); border-radius: 999px; overflow: hidden; margin-top: 6px; }
      .bar > span { display: block; height: 100%; background: var(--accent); }
      .bar.over > span { background: var(--warn); }
      .cat-row { padding: 12px 0; border-bottom: 1px solid var(--line); }
      .cat-row:last-child { border-bottom: none; }
      .cat-head { display: flex; justify-content: space-between; font-size: 0.92rem; }
      .muted { color: var(--muted); }
      .toast {
        position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
        background: var(--panel-2); border: 1px solid var(--line); padding: 10px 16px;
        border-radius: 10px; opacity: 0; transition: opacity 0.2s; pointer-events: none;
      }
      .toast.show { opacity: 1; }
      .toast.error { border-color: var(--warn); color: var(--warn); }
    </style>
  </head>
  <body>
    <header>
      <h1>💰 Kakeibo Engine <small>— mindful monthly budgeting</small></h1>
    </header>
    <main>
      <div class="row" style="margin-bottom: 8px">
        <div class="field" style="max-width: 200px">
          <label for="month">Month</label>
          <input type="month" id="month" />
        </div>
      </div>

      <section class="grid" id="stats"></section>

      <section class="card">
        <h2>Spending by category</h2>
        <div id="categories"><p class="muted">Loading…</p></div>
      </section>

      <section class="grid" style="grid-template-columns: 1fr 1fr">
        <div class="card">
          <h2>Forecast</h2>
          <div id="forecast"><p class="muted">Loading…</p></div>
        </div>

        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap">
            <h2 style="margin: 0">Recurring expenses</h2>
            <button type="button" id="post-recurring-btn" class="ghost">Post to this month</button>
          </div>
          <form id="recurring-form" style="margin-top: 12px">
            <div class="row">
              <div class="field" style="flex: 1 1 100%"><label>Name</label><input id="rec-name" placeholder="Rent, Netflix…" required /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field"><label>Amount</label><input id="rec-amount" type="number" step="0.01" min="0" required /></div>
              <div class="field"><label>Day</label><input id="rec-day" type="number" min="1" max="28" value="1" required /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field"><label>Category</label>
                <select id="rec-category">
                  <option value="NEEDS">Needs</option>
                  <option value="WANTS">Wants</option>
                  <option value="CULTURE">Culture</option>
                  <option value="UNEXPECTED">Unexpected</option>
                </select>
              </div>
              <div class="field" style="display: flex; align-items: flex-end"><button type="submit" style="width:100%">Add recurring</button></div>
            </div>
          </form>
          <div id="recurring-list" style="margin-top: 12px"></div>
        </div>
      </section>

      <section class="grid" style="grid-template-columns: 1fr 1fr">
        <div class="card">
          <h2>Add transaction</h2>
          <form id="tx-form">
            <div class="row">
              <div class="field"><label>Type</label>
                <select name="type" id="tx-type">
                  <option value="EXPENSE">Expense</option>
                  <option value="INCOME">Income</option>
                </select>
              </div>
              <div class="field"><label>Amount</label><input name="amount" id="tx-amount" type="number" step="0.01" min="0" required /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field" id="tx-category-field"><label>Category</label>
                <select name="category" id="tx-category">
                  <option value="NEEDS">Needs</option>
                  <option value="WANTS">Wants</option>
                  <option value="CULTURE">Culture</option>
                  <option value="UNEXPECTED">Unexpected</option>
                </select>
              </div>
              <div class="field"><label>Note</label><input name="note" id="tx-note" placeholder="optional" /></div>
            </div>
            <div style="margin-top: 12px"><button type="submit">Add</button></div>
          </form>
        </div>

        <div class="card">
          <h2>Monthly plan</h2>
          <form id="plan-form">
            <div class="row">
              <div class="field"><label>Planned income</label><input id="plan-income" type="number" step="0.01" min="0" required /></div>
              <div class="field"><label>Savings goal</label><input id="plan-savings" type="number" step="0.01" min="0" required /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field"><label>Needs budget</label><input id="plan-NEEDS" type="number" step="0.01" min="0" /></div>
              <div class="field"><label>Wants budget</label><input id="plan-WANTS" type="number" step="0.01" min="0" /></div>
            </div>
            <div class="row" style="margin-top: 10px">
              <div class="field"><label>Culture budget</label><input id="plan-CULTURE" type="number" step="0.01" min="0" /></div>
              <div class="field"><label>Unexpected budget</label><input id="plan-UNEXPECTED" type="number" step="0.01" min="0" /></div>
            </div>
            <div style="margin-top: 12px"><button type="submit" class="ghost">Save plan</button></div>
          </form>
        </div>
      </section>

      <section class="card">
        <h2>Transactions</h2>
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Note</th><th style="text-align:right">Amount</th><th></th></tr></thead>
          <tbody id="tx-list"><tr><td colspan="6" class="muted">Loading…</td></tr></tbody>
        </table>
      </section>

      <section class="card">
        <h2>Month-end reflection</h2>
        <form id="reflection-form" class="grid" style="grid-template-columns: 1fr 1fr"></form>
        <div style="margin-top: 12px"><button type="submit" form="reflection-form" class="ghost">Save reflection</button></div>
      </section>
    </main>
    <div class="toast" id="toast"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
